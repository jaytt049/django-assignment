{% extends 'blog/base.html' %}

{% block content %}

<h2>Your Files</h2>

<a href="{% url 'upload_file' %}">Upload File</a>

<ul>
{% for file in files %}
    <li>
        {{ file.title }} ({{ file.category.name }})
        <a href="{{ file.file.url }}">Download</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
