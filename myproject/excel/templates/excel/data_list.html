{% extends 'blog/base.html' %}

{% block content %}

<h2>Data Records</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Age</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r.name }}</td>
    <td>{{ r.email }}</td>
    <td>{{ r.age }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
